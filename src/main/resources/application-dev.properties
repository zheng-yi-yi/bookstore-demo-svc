# ==========================================
# Development Environment Configuration
# ==========================================

spring.application.name=Bookstore Demo

# ==========================================
# Database Configuration (MySQL)
# ==========================================
# 数据库连接地址
# 注意：后面的 ?useSSL=false&serverTimezone=UTC&characterEncoding=utf8 是常用参数
# bookstore_demo 是数据库名，请确保你已经在 MySQL 中创建了这个数据库
spring.datasource.url=jdbc:mysql://localhost:3306/bookstore_demo?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=root
# MySQL 驱动类 (Spring Boot 2.x/3.x 通常会自动检测，但写上更保险)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / Hibernate Configuration
# ==========================================
# DDL 模式：update 表示如果表不存在则创建，如果表结构变化则更新（开发环境推荐）
# 生产环境建议改为 validate 或 none
spring.jpa.hibernate.ddl-auto=update
# 在控制台显示 SQL 语句（开发调试时非常有用）
spring.jpa.show-sql=true
# 格式化显示 SQL（让控制台的 SQL 更易读）
spring.jpa.properties.hibernate.format_sql=true
# 数据库方言 (指定使用 MySQL 的方言，优化 SQL 生成)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
